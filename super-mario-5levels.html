<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超级马里奥 - 5关卡</title>
    <style>
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: monospace;
        }
        #gameContainer { position: relative; border: 4px solid #fff; }
        canvas { display: block; background: #5C94FC; }
        #ui {
            position: absolute; top: 0; left: 0; right: 0;
            padding: 10px 20px; display: flex; justify-content: space-between;
            color: white; font-size: 16px; text-shadow: 2px 2px 0 #000;
            background: rgba(0,0,0,0.5);
        }
        #screens > div {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9); display: none;
            flex-direction: column; align-items: center; justify-content: center;
            color: white;
        }
        #screens > div.active { display: flex; }
        button {
            padding: 15px 30px; font-size: 18px; cursor: pointer;
            background: #ff0000; color: white; border: none; margin: 10px;
        }
        h1 { color: #FFD700; text-shadow: 3px 3px #ff0000; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="ui">
            <span>关卡: <span id="level">1</span>/5</span>
            <span>分数: <span id="score">0</span></span>
            <span>生命: <span id="lives">3</span></span>
        </div>
        <canvas id="c" width="960" height="540"></canvas>
        <div id="screens">
            <div id="start" class="active">
                <h1>超级马里奥</h1>
                <p>5 关卡完整版</p>
                <button onclick="startGame()">开始</button>
            </div>
            <div id="levelComplete">
                <h2>关卡完成!</h2>
                <button onclick="nextLevel()">下一关</button>
            </div>
            <div id="gameComplete">
                <h2>🎉 通关! 🎉</h2>
                <p>最终分数: <span id="finalScore">0</span></p>
                <button onclick="restartGame()">重来</button>
            </div>
        </div>
    </div>

    <script>
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');
    
    let state = 'start', level = 1, score = 0, lives = 3;
    const TILE = 32;
    const player = { 
        x: TILE, y: 400, w: 28, h: 28, vx: 0, vy: 0, g: 0.6, grounded: false, f: 1, invincible: false
    };
    
    let camera = { x: 0 };
    let platforms = [], coins = [], enemies = [], pipes = [], blocks = [], flag = null;
    let keys = {};
    
    const levels = {

                 {x:34*32, y:11*32, w:6*32, h:32},
             ],
             coins: [
                 {x:10*32,y:10*32},{x:16*32,y:7*32},{x:22*32,y:10*32},

             ],
             flag: {x:43*32,y:12*32,h:2.5*32} 
        },
        2: { name: "地下洞穴",
             platforms: [
                 {x:0, y:540, w:800, h:64},
                 {x:6*32, y:13*32, w:3*32, h:32},
                 {x:11*32, y:10*32, w:3*32, h:32},
                 {x:15*32, y:13*32, w:3*32, h:32},
                 {x:20*32, y:10*32, w:3*32, h:32},
                 {x:26*32, y:540, w:700, h:64},
                 {x:31*32, y:12*32, w:4*32, h:32},
                 {x:37*32, y:9*32, w:3*32, h:32},
             ],
             coins: [

                 {x:21*32,y:8*32},{x:32*32,y:10*32},{x:38*32,y:7*32}
             ],
             enemies: [
                 {x:9*32,y:512,vx:-1,s:7*32,e:12*32,t:'g'},
                 {x:17*32,y:512,vx:-1,s:15*32,e:20*32,t:'t'},
                 {x:27*32,y:512,vx:-1,s:25*32,e:30*32,t:'g'},
                 {x:34*32,y:512,vx:-1,s:32*32,e:38*32,t:'t'}
             ],
             pipes: [{x:14*32,y:14*32,h:2*32}],
             blocks: [{x:11*32,y:8*32,c:'s'},{x:12*32,y:8*32,c:'c'}],
             flag: {x:45*32,y:12*32,h:2.5*32}
        },
        3: { name: "水上桥梁",
             platforms: [
                 {x:0, y:540, w:7*32, h:64},
                 {x:8*32, y:13*32, w:2*32, h:32},
                 {x:11*32, y:11*32, w:2*32, h:32},
                 {x:14*32, y:9*32, w:2*32, h:32},
                 {x:17*32, y:11*32, w:2*32, h:32},
                 {x:20*32, y:13*32, w:2*32, h:32},
                 {x:23*32, y:540, w:7*32, h:64},
                 {x:31*32, y:540, w:10*32, h:64},
                 {x:34*32, y:12*32, w:3*32, h:32},
                 {x:39*32, y:9*32, w:3*32, h:32},
             ],
             coins: [
                 {x:9*32,y:11*32},{x:12*32,y:9*32},{x:15*32,y:7*32},
                 {x:18*32,y:9*32},{x:21*32,y:11*32},{x:35*32,y:10*32},{x:40*32,y:7*32}
             ],

             ],
             pipes: [],

             flag: {x:46*32,y:12*32,h:2.5*32}
        },
        4: { name: "黑暗工厂",
             platforms: [
                 {x:0, y:540, w:10*32, h:64},
                 {x:11*32, y:13*32, w:2*32, h:32},
                 {x:14*32, y:11*32, w:2*32, h:32},
                 {x:17*32, y:9*32, w:2*32, h:32},
                 {x:20*32, y:11*32, w:2*32, h:32},
                 {x:23*32, y:13*32, w:2*32, h:32},
                 {x:26*32, y:540, w:10*32, h:64},
                 {x:37*32, y:12*32, w:4*32, h:32},
                 {x:42*32, y:10*32, w:4*32, h:32},
             ],
             coins: [
                 {x:12*32,y:11*32},{x:15*32,y:9*32},{x:18*32,y:7*32},
                 {x:21*32,y:9*32},{x:24*32,y:11*32},{x:38*32,y:10*32},{x:43*32,y:8*32}
             ],
             enemies: [
                 {x:3*32,y:512,vx:-1,s:1*32,e:6*32,t:'g'},
                 {x:6*32,y:512,vx:-1,s:4*32,e:9*32,t:'t'},
                 {x:28*32,y:512,vx:-1,s:26*32,e:32*32,t:'g'},
                 {x:31*32,y:512,vx:-1,s:29*32,e:35*32,t:'t'}
             ],
             pipes: [{x:9*32,y:14*32,h:2*32},{x:35*32,y:14*32,h:2*32}],
             blocks: [{x:14*32,y:6*32,c:'s'},{x:15*32,y:6*32,c:'c'}],
             flag: {x:48*32,y:12*32,h:2.5*32}
        },
        5: { name: "城堡外墙",
             platforms: [
                 {x:0, y:540, w:7*32, h:64},
                 {x:8*32, y:13*32, w:3*32, h:32},
                 {x:12*32, y:11*32, w:3*32, h:32},
                 {x:16*32, y:9*32, w:3*32, h:32},
                 {x:20*32, y:11*32, w:3*32, h:32},
                 {x:24*32, y:13*32, w:3*32, h:32},
                 {x:28*32, y:540, w:7*32, h:64},
                 {x:36*32, y:12*32, w:4*32, h:32},
                 {x:41*32, y:10*32, w:3*32, h:32},
                 {x:45*32, y:7*32, w:4*32, h:32},
             ],
             coins: [
                 {x:9*32,y:11*32},{x:13*32,y:9*32},{x:17*32,y:7*32},
                 {x:21*32,y:9*32},{x:25*32,y:11*32},{x:37*32,y:10*32},
                 {x:42*32,y:8*32},{x:46*32,y:5*32}
             ],
             enemies: [
                 {x:3*32,y:512,vx:-1,s:1*32,e:6*32,t:'g'},
                 {x:9*32,y:512,vx:-1,s:7*32,e:12*32,t:'t'},
                 {x:15*32,y:512,vx:-1,s:13*32,e:18*32,t:'t'},
                 {x:30*32,y:512,vx:-1,s:28*32,e:34*32,t:'g'},
                 {x:34*32,y:512,vx:-1,s:32*32,e:38*32,t:'t'}
             ],
             pipes: [],
             blocks: [
                 {x:12*32,y:5*32,c:'m'},{x:13*32,y:5*32,c:'s'},{x:14*32,y:5*32,c:'c'}
             ],
             flag: {x:50*32,y:12*32,h:2.5*32}
        }
    };
    
    function loadLevel(l) {
        const d = levels[l];
        platforms = d.platforms;
        coins = d.coins.map(c => ({...c, col: false}));
        enemies = d.enemies.map(e => ({...e, dead: false}));
        pipes = d.pipes;
        blocks = d.blocks.map(b => ({...b, hit: false}));
        flag = d.flag;
        player.x = TILE; player.y = 400; player.vx = 0; player.vy = 0;
        player.grounded = false;
        camera.x = 0;
    }
    
    function drawBg() {
        const g = ctx.createLinearGradient(0,0,0,c.height);
        if(level==2) { g.addColorStop(0,'#1a1a1a'); g.addColorStop(1,'#2d2d2d'); }
        else if(level==4) { g.addColorStop(0,'#2d1a1a'); g.addColorStop(1,'#4a2d2d'); }
        else { g.addColorStop(0,'#5C94FC'); g.addColorStop(1,'#3d6bdb'); }
        ctx.fillStyle = g; ctx.fillRect(0,0,c.width,c.height);
        
        if(level!=2) {
            ctx.fillStyle='rgba(255,255,255,0.8)';
            [[3,2,1],[12,1.5,0.8],[22,2.5,1.2]].forEach(([tx,ty,s])=>{
                const x = tx*32 - camera.x*0.1;
                const y = ty*32;
                if(x>-100 && x<c.width+100) {
                    ctx.save();
                    ctx.translate(x,y);
                    ctx.scale(s,s);
                    ctx.beginPath();
                    ctx.arc(0,0,25,0,Math.PI*2);
                    ctx.arc(30,0,30,0,Math.PI*2);
                    ctx.arc(60,0,25,0,Math.PI*2);
                    ctx.fill();
                    ctx.restore();
                }
            });
            ctx.fillStyle=level==3?'#2d5a27':'#006400';
            [[0,17,9,6],[12,17,11,8],[28,17,9,5]].forEach(([tx,ty,tw,th])=>{
                const x = tx*32 - camera.x*0.2;
                const y = ty*32;
                if(x+tw*32>0 && x<c.width) {
                    ctx.beginPath();
                    ctx.moveTo(x,y);
                    ctx.lineTo(x+tw*16,y-th*32);
                    ctx.lineTo(x+tw*32,y);
                    ctx.fill();
                }
            });
        }
    }
    
    function drawP(p) {
        const x = p.x - camera.x;
        if(x+p.w<0 || x>c.width) return;
        const bottomY = p.y;
        const topY = p.y - p.h;
        ctx.fillStyle='#00AA00';
        ctx.fillRect(x, topY, p.w, 8);
        ctx.fillStyle='#8B4513';
        ctx.fillRect(x, topY+8, p.w, p.h-8);
        ctx.fillStyle='#00DD00';
        for(let i=0; i<p.w; i+=16) ctx.fillRect(x+i, topY, 12, 4);
        ctx.strokeStyle='#6B3510';
        ctx.lineWidth=1;
        for(let row=0; row<p.h/16; row++) {
            for(let col=0; col<p.w/32; col++) {
                ctx.strokeRect(x+col*32, topY+row*16, 32, 16);
            }
        }
    }
    
    function drawCoin(c) {
        if(c.col) return;
        const x = c.x - camera.x;
        if(x<-20 || x>c.width+20) return;
        const bounce = Math.sin(Date.now()/150) * 2;
        const size = 16;
        ctx.fillStyle='#FFD700';
        ctx.beginPath();
        ctx.arc(x+size/2, c.y+size/2+bounce, size/2-1, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle='#FFEE88';
        ctx.beginPath();
        ctx.arc(x+size/2-3, c.y+size/2-3+bounce, 3, 0, Math.PI*2);
        ctx.fill();
    }
    
    function drawEnemy(e) {
        if(e.dead) return;
        const x = e.x - camera.x;
        if(x<-32 || x>c.width+32) return;
        const w = 28, h = 28;
        if(e.t=='g') {
            ctx.fillStyle='#8B4513';
            ctx.beginPath();
            ctx.arc(x+14, e.y-14, 14, Math.PI, 0);
            ctx.fill();
            ctx.fillStyle='#CC6600';
            ctx.beginPath();
            ctx.arc(x+14, e.y-14, 12, Math.PI, 0);
            ctx.fill();
            ctx.fillStyle='#FFF';
            ctx.beginPath(); ctx.arc(x+8, e.y-20, 3, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(x+18, e.y-18, 2, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle='#000';
            ctx.fillRect(x+8, e.y-16, 4, 4);
            ctx.fillRect(x+16, e.y-16, 4, 4);
            ctx.fillRect(x+10, e.y-8, 8, 2);
            const walk = Math.floor(Date.now()/200)%2;
            ctx.fillStyle='#8B4513';
            ctx.fillRect(x+4+walk*4, e.y-4, 8, 4);
            ctx.fillRect(x+12-walk*4, e.y-4, 8, 4);
        } else {
            ctx.fillStyle='#006400';
            ctx.beginPath();
            ctx.arc(x+14, e.y-14, 14, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle='#00AA00';
            ctx.beginPath();
            ctx.arc(x+14, e.y-14, 10, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x+26, e.y-20, 8, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle='#000';
            ctx.fillRect(x+24, e.y-22, 3, 3);
            ctx.fillRect(x+30, e.y-22, 3, 3);
            const walk = Math.floor(Date.now()/300)%2;
            ctx.fillStyle='#00AA00';
            ctx.fillRect(x+6+walk*4, e.y-2, 6, 4);
            ctx.fillRect(x+18-walk*4, e.y-2, 6, 4);
        }
    }
    
    function drawPipe(p) {
        const x = p.x - camera.x;
        if(x+48<0 || x>c.width) return;
        ctx.fillStyle='#00AA00';
        ctx.fillRect(x, p.y-p.h, 48, p.h);
        ctx.fillStyle='#00DD00';
        ctx.fillRect(x-4, p.y-p.h-10, 56, 16);
        ctx.fillStyle='#00FF00';
        ctx.fillRect(x+4, p.y-p.h, 4, p.h);
        ctx.fillRect(x, p.y-p.h-6, 48, 4);
    }
    
    function drawBlock(b) {
        if(b.hit) return;
        const x = b.x - camera.x;
        if(x+32<0 || x>c.width) return;
        ctx.fillStyle='#B8860B';
        ctx.fillRect(x, b.y-32, 32, 32);
        ctx.fillStyle='#FFD700';
        ctx.font='bold 24px monospace';
        ctx.textAlign='center';
        ctx.textBaseline='middle';
        ctx.fillText('?', x+16, b.y-16);
        ctx.strokeStyle='#8B6914';
        ctx.lineWidth=2;
        ctx.strokeRect(x, b.y-32, 32, 32);
    }
    
    function drawFlag() {
        if(!flag) return;
        const x = flag.x - camera.x;
        if(x<-50 || x>c.width+50) return;
        const bottomY = flag.y;
        ctx.fillStyle='#8B4513';
        ctx.fillRect(x, bottomY-flag.h, 8, flag.h);
        const wave = Math.sin(Date.now()/200)*5;
        ctx.fillStyle='#00DD00';
        ctx.beginPath();
        ctx.moveTo(x+8, bottomY-flag.h+10);
        ctx.lineTo(x+50+wave, bottomY-flag.h+25);
        ctx.lineTo(x+8, bottomY-flag.h+40);
        ctx.fill();
        ctx.fillStyle='#FFD700';
        ctx.beginPath();
        ctx.arc(x+4, bottomY-flag.h, 8, 0, Math.PI*2);
        ctx.fill();
        if(level==5) {
            ctx.fillStyle='#8B0000';
            ctx.fillRect(x-32, bottomY-flag.h-48, 72, 64);
            ctx.fillRect(x-32, bottomY-flag.h-64, 16, 16);
            ctx.fillRect(x-8, bottomY-flag.h-64, 16, 16);
            ctx.fillRect(x+16, bottomY-flag.h-64, 16, 16);
            ctx.fillStyle='#4a0000';
            ctx.fillRect(x-8, bottomY-flag.h-16, 32, 32);
        }
    }
    
    function drawMario() {
        const {x,y,f} = player;
        const drawX = x - camera.x;
        ctx.save();
        ctx.translate(drawX + player.w/2, y);
        ctx.scale(f, 1);
        ctx.translate(-player.w/2, 0);
        const w = player.w, h = player.h;
        ctx.fillStyle='#E70012';
        ctx.fillRect(4, 0, 20, 12);
        ctx.fillStyle='#0044BD';
        ctx.fillRect(2, 0, 24, 4);
        ctx.fillRect(0, 4, 4, 4);
        ctx.fillStyle='#FFCC99';
        ctx.fillRect(6, 4, 16, 8);
        ctx.fillStyle='#000';
        ctx.fillRect(14, 6, 4, 4);
        ctx.fillStyle='#E70012';
        ctx.fillRect(4, 12, 20, 10);
        ctx.fillStyle='#0044BD';
        ctx.fillRect(4, 20, 20, 10);
        ctx.fillStyle='#0033AD';
        ctx.fillRect(6, 20, 4, 10);
        ctx.fillRect(18, 20, 4, 10);
        ctx.fillStyle='#FFCC00';
        ctx.fillRect(10, 22, 3, 3);
        ctx.fillRect(17, 22, 3, 3);
        ctx.fillStyle='#0044BD';
        const walk = Math.floor(Date.now()/150) % 2;
        if(!player.grounded) {
            ctx.fillRect(6, 30, 6, 4);
            ctx.fillRect(16, 30, 6, 4);
        } else {
            ctx.fillRect(6+walk*2, 30, 6, 4);
            ctx.fillRect(16-walk*2, 30, 6, 4);
        }
        ctx.restore();
    }
    
    function update() {
        if(state!='playing') return;
        if(keys['ArrowLeft'] || keys['a'] || keys['A']) { player.vx = -5; player.f = -1; }
        else if(keys['ArrowRight'] || keys['d'] || keys['D']) { player.vx = 5; player.f = 1; }
        else player.vx *= 0.85;
        if((keys[' '] || keys['ArrowUp'] || keys['w'] || keys['W']) && player.grounded) { player.vy = -13; player.grounded = false; }
        player.vy += player.g;
        if(player.vy > 12) player.vy = 12;
        player.x += player.vx;
        player.y += player.vy;
        if(player.x < 0) player.x = 0;
        player.grounded = false;
        for(let p of platforms) {
            const pTop = p.y - p.h;
            const pBottom = p.y;
            if(player.x + player.w > p.x && player.x < p.x + p.w &&
               player.y + player.h >= pTop && player.y + player.h <= pBottom + player.vy + 5 &&
               player.vy >= 0) {
                player.y = pTop - player.h;
                player.vy = 0;
                player.grounded = true;
            }
        }
        if(player.y > c.height + 50) {
            lives--;
            document.getElementById('lives').innerText=lives;
            if(lives <= 0) { state='start'; document.getElementById('start').style.display='flex'; document.getElementById('start').classList.add('active'); }
            else { loadLevel(level); }
        }
        for(let coin of coins) {
            if(!coin.col && player.x + player.w > coin.x && player.x < coin.x + 16 && player.y + player.h > coin.y && player.y < coin.y + 16) {
                coin.col = true;
                score += 100;
                document.getElementById('score').innerText=score;
            }
        }
        for(let e of enemies) {
            if(e.dead) continue;
            e.x += e.vx;
            if(e.x < e.s || e.x > e.e) e.vx *= -1;
            if(player.x + player.w > e.x && player.x < e.x + 28 && player.y + player.h > e.y - 28 && player.y < e.y) {
                if(player.vy > 0 && player.y + player.h < e.y - 10) {
                    player.vy = -8;
                    e.dead = true;
                    score += 200;
                    document.getElementById('score').innerText=score;
                } else if(!player.invincible) {
                    lives--;
                    document.getElementById('lives').innerText=lives;
                    if(lives <= 0) { state='start'; document.getElementById('start').style.display='flex'; document.getElementById('start').classList.add('active'); }
                    else { loadLevel(level); }
                }
            }
        }
        for(let b of blocks) {
            if(b.hit) continue;
            if(player.x + player.w > b.x && player.x < b.x + 32 && player.y < b.y && player.y + player.h > b.y - 32 && player.vy < 0) {
                b.hit = true;
                player.vy = 4;
                if(b.c == 'c') score += 50;
                else if(b.c == 's') { player.invincible = true; setTimeout(()=>player.invincible=false, 10000); }
                document.getElementById('score').innerText=score;
            }
        }
        if(flag && player.x > flag.x - 20) {
            score += 1000;
            document.getElementById('score').innerText=score;
            if(level == 5) { state = 'gameComplete'; document.getElementById('finalScore').innerText = score; document.getElementById('gameComplete').style.display = 'flex'; }
            else { state = 'levelComplete'; document.getElementById('levelScore').innerText = score; document.getElementById('levelComplete').style.display = 'flex'; }
        }
        camera.x = Math.max(0, player.x - c.width/3);
    }
    
    function draw() {
        drawBg();
        platforms.forEach(drawP);
        coins.forEach(drawCoin);
        enemies.forEach(drawEnemy);
        pipes.forEach(drawPipe);
        blocks.forEach(drawBlock);
        drawFlag();
        drawMario();
    }
    
    function loop() { update(); draw(); requestAnimationFrame(loop); }
    
    function startGame() {
        document.querySelectorAll('#screens>div').forEach(d=>d.style.display='none');
        level = 1; score = 0; lives = 3;
        document.getElementById('level').innerText=level;
        document.getElementById('score').innerText=score;
        document.getElementById('lives').innerText=lives;
        loadLevel(level);
        state='playing';
    }
    
    function nextLevel() {
        document.getElementById('levelComplete').style.display='none';
        level++;
        document.getElementById('level').innerText=level;
        loadLevel(level);
        state='playing';
    }
    
    function restartGame() {
        document.getElementById('gameComplete').style.display='none';
        startGame();
    }
    
    document.addEventListener('keydown', e => { keys[e.key] = true; if([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault(); });
    document.addEventListener('keyup', e => keys[e.key] = false);
    
    loop();
    </script>
</body>
</html>
